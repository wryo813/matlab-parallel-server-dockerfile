services:
  matlab-head-node:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: matlab-head-node
    network_mode: host
    ipc: host
    restart: always
    environment:
      - FQDN=${FQDN:-head.matlab.internal}
      - JM_NAME=${JM_NAME:-MyMJS}
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        
        EXISTING_MATLAB_LOCATION=$$(dirname $$(dirname $$(readlink -f $$(which matlab))))
        MJS_DEF_FILE="$${EXISTING_MATLAB_LOCATION}/toolbox/parallel/bin/mjs_def.sh"
        MJS_BIN="$${EXISTING_MATLAB_LOCATION}/toolbox/parallel/bin/mjs"
        START_JOB_MANAGER_BIN="$${EXISTING_MATLAB_LOCATION}/toolbox/parallel/bin/startjobmanager"
        NODESTATUS_BIN="$${EXISTING_MATLAB_LOCATION}/toolbox/parallel/bin/nodestatus"
        
        if [ -n "$${FQDN}" ] && [ -f "$${MJS_DEF_FILE}" ]; then
            sed -i 's|^#HOSTNAME=`hostname -f`|HOSTNAME="'"$${FQDN}"'"|' "$${MJS_DEF_FILE}"
        fi
        
        # ジョブマネージャーの起動をラップする関数
        start_jm_wrapper() {
            local MAX_WAIT_SECONDS=300
            local SLEEP_SECONDS=2
            local ELAPSED=0
            
            # ローカルの mjs サービスが起動するまでポーリング待機（タイムアウト付き）
            until "$${NODESTATUS_BIN}" | grep -qi "Running"; do
                if [ "$${ELAPSED}" -ge "$${MAX_WAIT_SECONDS}" ]; then
                    echo "Error: MJS service did not reach 'Running' state within $${MAX_WAIT_SECONDS} seconds. Exiting." >&2
                    exit 1
                fi
                sleep "$${SLEEP_SECONDS}"
                ELAPSED=$$((ELAPSED + SLEEP_SECONDS))
            done
            
            # ジョブマネージャープロセスの起動
            "$${START_JOB_MANAGER_BIN}" -name "$${JM_NAME}" -clean -v
        }
        
        # ジョブマネージャーラッパーをバックグラウンドで起動
        start_jm_wrapper &
        JM_WRAPPER_PID=$$!
        
        # mjs サービスをフォアグラウンドで起動（シェルを PID 1 として残す）
        "$${MJS_BIN}" console -clean &
        MJS_PID=$$!
        
        # いずれかのプロセスが終了したら、もう一方を停止して終了コードを伝播
        set +e
        wait -n "$${JM_WRAPPER_PID}" "$${MJS_PID}"
        EXIT_CODE=$$?
        
        # 残っている方があれば停止
        if kill -0 "$${JM_WRAPPER_PID}" 2>/dev/null; then
            kill "$${JM_WRAPPER_PID}" 2>/dev/null || true
        fi
        if kill -0 "$${MJS_PID}" 2>/dev/null; then
            kill "$${MJS_PID}" 2>/dev/null || true
        fi
        
        # 子プロセスの終了を待ち、同じ終了コードで終了
        wait || true
        exit "$${EXIT_CODE}"