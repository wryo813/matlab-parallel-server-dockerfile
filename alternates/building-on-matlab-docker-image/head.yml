services:
  matlab-head-node:
    image: wryo/matlab-parallel-server-minimal:R2025b
    container_name: matlab-head-node
    network_mode: host
    ipc: host
    restart: always
    environment:
      - NODE_TYPE=head
      - FQDN=head.matlab.internal # 実際のFQDNに変更
      - JM_NAME=MyMJS
      - COMPUTE_NODES_CONFIG=docker-test.matlab.internal:4
    volumes:
      - ./entrypoint.sh:/tmp/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/tmp/entrypoint.sh"]
